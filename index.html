<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رسالة خاصة</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0a0a0a;
            --heart-color: #ff0a54;
            --text-color: #ffffff;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Amiri', serif;
            display: flex;
            flex-direction: column; /* مضاف لضمان ترتيب الفوتر بالأسفل */
            justify-content: center;
            align-items: center;
            overflow: hidden;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        #canvas-stars {
            position: fixed;
            top: 0; left: 0;
            z-index: -1;
            width: 100%; height: 100%;
            display: block;
            pointer-events: none;
        }

        .content-wrapper {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            width: 85%;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            z-index: 5;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            height: 100px;
            position: relative;
        }

        .btn {
            padding: 12px 25px;
            border-radius: 50px;
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            min-width: 90px;
            outline: none;
        }

        .yes-btn {
            background: linear-gradient(45deg, #ff0a54, #ff476d);
            color: white;
        }

        .no-btn {
            background: #ffffff;
            color: #000;
            position: absolute;
            z-index: 100;
        }

        #success-message {
            display: none;
            padding: 20px;
            animation: fadeIn 1s ease-in;
        }

        .message-text {
            font-size: 1.3rem;
            line-height: 1.8;
            color: #fff;
            margin-top: 15px;
        }

        .heart-shape {
            font-size: 60px;
            color: var(--heart-color);
            display: inline-block;
            animation: pulse 0.8s infinite;
        }

        /* --- تنسيق الفوتر الجديد --- */
        footer {
            position: fixed;
            bottom: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            z-index: 10;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        footer a {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            transition: 0.3s;
        }

        footer a:hover {
            color: var(--heart-color);
            text-shadow: 0 0 10px var(--heart-color);
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <canvas id="canvas-stars"></canvas>

    <div class="content-wrapper" id="main-card">
        <h1>هل تحبيني؟</h1>
        <div class="btn-container">
            <button class="btn yes-btn" id="yesBtn">نعم</button>
            <button class="btn no-btn" id="noBtn">لا</button>
        </div>
    </div>

    <div class="content-wrapper" id="success-message">
        <div class="heart-shape">❤</div>
        <div class="message-text">
            امونتي وحبيبتي، أنا آسف لكِ يا عمري والله العظيم بحبك .
        </div>
    </div>

    <footer>
        <a href="https://www.facebook.com/share/1DaJL4XwNJ/" target="_blank">
            By Mohamed A Elkholy
        </a>
    </footer>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const mainCard = document.getElementById('main-card');
        const successMessage = document.getElementById('success-message');

        function moveButton() {
            const padding = 50;
            const maxX = window.innerWidth - noBtn.offsetWidth - padding;
            const maxY = window.innerHeight - noBtn.offsetHeight - padding;
            
            const randomX = Math.max(padding, Math.floor(Math.random() * maxX));
            const randomY = Math.max(padding, Math.floor(Math.random() * maxY));
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        noBtn.addEventListener('mouseenter', moveButton);
        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            moveButton();
        });

        yesBtn.addEventListener('click', () => {
            mainCard.style.display = 'none';
            successMessage.style.display = 'block';
            
            const end = Date.now() + (3 * 1000);
            (function frame() {
                confetti({
                    particleCount: 3,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#ff0a54', '#ffffff']
                });
                confetti({
                    particleCount: 3,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#ff0a54', '#ffffff']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        });

        const canvas = document.getElementById('canvas-stars');
        const ctx = canvas.getContext('2d');
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const stars = Array.from({ length: 80 }, () => ({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 1.5,
            opacity: Math.random(),
            speed: Math.random() * 0.02
        }));

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            stars.forEach(s => {
                ctx.globalAlpha = s.opacity;
                ctx.fillStyle = "white";
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                ctx.fill();
                
                s.opacity += s.speed;
                if (s.opacity > 1 || s.opacity < 0) s.speed = -s.speed;
            });
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
